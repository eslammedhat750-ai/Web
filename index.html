<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #0062cc; --s: #28a745; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; overflow-x: hidden; text-align: right; }
        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .cart-trigger { position: relative; cursor: pointer; }
        #badge { position: absolute; top: -5px; right: -8px; background: red; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; }
        .slider { position: relative; height: 150px; overflow: hidden; }
        .slides { display: flex; transition: 0.4s; width: 100%; height: 100%; }
        .slides img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; }
        .details { padding: 10px; text-align: center; flex: 1; display: flex; flex-direction: column; }
        .details h3 { font-size: 11px; margin: 5px 0; height: 32px; overflow: hidden; color: #333; line-height: 1.4; }
        .price { color: var(--p); font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; }
        .btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: auto; }
        
        /* تصليح شكل السلة */
        #cart-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; }
        .cart-content { background: #fff; width: 100%; position: absolute; bottom: 0; border-radius: 20px 20px 0 0; padding: 20px; max-height: 70vh; overflow-y: auto; text-align: right; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; direction: rtl; }
        .item-info { flex: 1; text-align: right; }
        .del-btn { color: #ff3b30; border: 1px solid #ff3b30; background: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-right: 10px; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 100; }
        .nav a { color: #999; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" style="height:30px;">
    <div class="cart-trigger" onclick="showCart()">
        <i class="fas fa-shopping-basket" style="font-size:24px;color:var(--p)"></i>
        <span id="badge">0</span>
    </div>
</header>

<div class="container">
    <div class="card">
        <div class="slider"><div class="slides"><img src="6.PNG"></div></div>
        <div class="details"><h3>جهاز STAR للعناية بالتنفس</h3><span class="price">1100 ج.م</span><button class="btn" onclick="addItem(this,'نيبولايزر STAR',1100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="2.PNG"><img src="2-2.PNG"></div></div>
        <div class="details"><h3>شاشة القياسات الرقمية</h3><span class="price">2100 ج.م</span><button class="btn" onclick="addItem(this,'شاشة قياسات',2100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider"><div class="slides"><img src="1.PNG"></div></div>
        <div class="details"><h3>وسادة الاسترخاء الحرارية</h3><span class="price">850 ج.م</span><button class="btn" onclick="addItem(this,'وسادة الاسترخاء',850)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="3.PNG"><img src="3-2.PNG"></div></div>
        <div class="details"><h3>جهاز Thrive للمساج</h3><span class="price">1100 ج.م</span><button class="btn" onclick="addItem(this,'جهاز Thrive',1100)">أضف للسلة</button></div>
    </div>
</div>

<div id="cart-ui" onclick="showCart()">
    <div class="cart-content" onclick="event.stopPropagation()">
        <h3 style="text-align:center; margin:0 0 20px; color:var(--p);">سلتك</h3>
        <div id="list"></div>
        <div style="margin-top:20px; padding:15px 0; border-top:2px solid #eee; display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
            <span>الإجمالي:</span><span><span id="total">0</span> ج.م</span>
        </div>
        <button onclick="goWA()" style="width:100%; background:var(--s); color:#fff; border:none; padding:16px; border-radius:12px; margin-top:15px; font-weight:bold; font-size:16px;">تأكيد عبر واتساب</button>
    </div>
</div>

<div class="nav">
    <a href="#" style="color:var(--p)"><i class="fas fa-home"></i></a>
    <a href="https://t.me/emmedical7" target="_blank"><i class="fab fa-telegram"></i></a>
    <a href="javascript:void(0)" onclick="showCart()"><i class="fas fa-shopping-basket"></i></a>
</div>

<script>
    let cart = [];
    function slide(el) {
        const s = el.querySelector('.slides');
        s.style.transform = (s.style.transform === 'translateX(100%)') ? 'translateX(0)' : 'translateX(100%)';
    }
    setInterval(() => { document.querySelectorAll('.auto-v').forEach(s => slide(s.parentElement)); }, 4000);

    function addItem(btn, n, p) {
        cart.push({n, p});
        document.getElementById('badge').innerText = cart.length;
        btn.innerHTML = "تم ✅"; btn.style.background = "var(--s)";
        setTimeout(() => { btn.innerHTML = "أضف للسلة"; btn.style.background = "var(--p)"; }, 800);
    }

    function showCart() {
        const ui = document.getElementById('cart-ui');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
        if(ui.style.display === 'block') renderCart();
    }

    function renderCart() {
        let html = "", total = 0;
        if(cart.length === 0) {
            html = "<p style='text-align:center; color:#999; padding:20px;'>السلة فارغة</p>";
        } else {
            cart.forEach((item, index) => {
                html += `<div class="cart-item">
                    <div class="item-info">
                        <div style="font-weight:bold; font-size:14px;">${item.n}</div>
                        <div style="color:var(--p); font-size:13px;">${item.p} ج.م</div>
                    </div>
                    <button class="del-btn" onclick="deleteItem(${index})"><i class="fas fa-trash"></i> حذف</button>
                </div>`;
                total += item.p;
            });
        }
        document.getElementById('list').innerHTML = html;
        document.getElementById('total').innerText = total;
    }

    function deleteItem(index) {
        cart.splice(index, 1);
        document.getElementById('badge').innerText = cart.length;
        renderCart();
    }

    function goWA() {
        if(cart.length === 0) return;
        let msg = "طلب جديد من Em Medical:%0A";
        cart.forEach((item, i) => msg += `${i+1}- ${item.n} (${item.p} ج.م)%0A`);
        window.open(`https://wa.me/201153951440?text=${msg}%0A💰 الإجمالي: ${document.getElementById('total').innerText} ج.م`);
    }
</script>
</body>
</html>
