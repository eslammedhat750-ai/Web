<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical | متجر الأجهزة الطبية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --p: #0052cc; --bg: #f0f2f5; --w: #ffffff; --text: #1c1e21; --gray: #65676b; --gold: #b8860b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); padding-bottom: 100px; overflow-x: hidden; color: var(--text); }
        
        header { background: #fff; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo img { height: 40px; }
        
        /* شريط أسعار الجملة الجديد */
        .wholesale-banner { background: #fff9c4; color: #856404; text-align: center; padding: 8px; font-size: 13px; font-weight: 800; border-bottom: 1px solid #ffe082; }

        .cats-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #fff; position: sticky; top: 70px; z-index: 999; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .cats-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #eee; color: #555; padding: 8px 20px; border-radius: 20px; border: none; font-weight: 700; white-space: nowrap; cursor: pointer; font-size: 13px; }
        .cat-btn.active { background: var(--p); color: #fff; }
        /* تمييز زرار الجملة */
        .cat-btn.wholesale-btn { background: #fff3e0; color: var(--gold); border: 1px solid var(--gold); }
        .cat-btn.wholesale-btn.active { background: var(--gold); color: #fff; }

        .cnt { padding: 15px; max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .card { background: #fff; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; position: relative; min-height: 270px; }
        .card:active { transform: scale(0.98); }
        
        .img-h { width: 100%; height: 130px; position: relative; background: transparent; border-radius: 15px; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .img-h img { max-width: 100%; max-height: 100%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 0.6s ease-in-out; z-index: 1; }
        .img-h img.active { opacity: 1; z-index: 2; }
        
        .card h3 { font-size: 12px; font-weight: 800; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; color: var(--text); }
        .price { color: var(--p); font-weight: 900; margin-top: auto; margin-bottom: 8px; font-size: 14px; }
        .card-btns { display: flex; gap: 5px; margin-top: auto; }
        .viw-btn { background: #f0f2f5; color: var(--text); border: none; flex: 1; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .add-btn-quick { background: #ebf1ff; color: var(--p); border: none; width: 40px; height: 38px; border-radius: 10px; font-size: 14px; cursor: pointer; }

        /* بوب أب التفاصيل */
        .pop-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; }
        .pop-ov.active { display: flex; }
        .pop-pan { background: #fff; width: 100%; max-width: 500px; border-radius: 25px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-pop { position: absolute; top: 15px; left: 15px; background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 10; }
        
        .pop-img-h { width: 100%; height: 220px; background: transparent; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .pop-img-h img { max-width: 100%; max-height: 100%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 0.6s; }
        .pop-img-h img.active { opacity: 1; }
        
        .pop-pan h2 { font-size: 16px; font-weight: 900; margin-bottom: 10px; }
        .desc-text { font-size: 12px; color: var(--gray); line-height: 1.6; }
        .desc-text ul { list-style: none; }
        .desc-text li { position: relative; padding-right: 15px; margin-bottom: 5px; }
        .desc-text li::before { content: "•"; color: var(--p); position: absolute; right: 0; font-weight: bold; }
        
        .pop-price-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .pop-price { font-size: 20px; font-weight: 900; color: var(--p); }
        .pop-add-btn { background: var(--p); color: #fff; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* السلة المحسنة */
        .ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; }
        .pan { background: #fff; width: 100%; position: absolute; bottom: 0; border-radius: 25px 25px 0 0; padding: 25px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f2f5; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .cart-item-price { font-size: 12px; color: var(--p); font-weight: 800; }
        .cart-qty-ctrl { display: flex; align-items: center; background: #f0f2f5; border-radius: 10px; padding: 4px; }
        .qty-btn { background: #fff; border: none; width: 28px; height: 28px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .f-btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 15px; cursor: pointer; }
        
        .c-icon { position: relative; background: var(--p); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }
        #c-badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: #fff; font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #fff; }
        
        .b-nav { position: fixed; bottom: 0; width: 100%; background: #fff; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .n-i { text-decoration: none; color: #999; font-size: 11px; text-align: center; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="logo.png" alt="Em Medical"></div>
    <div class="c-icon" onclick="tglCart()"><i class="fas fa-shopping-basket"></i><span id="c-badge">0</span></div>
</header>

<div class="wholesale-banner">
    <i class="fas fa-box-open"></i> أسعار خاصة جداً للتجار وللجملة
</div>

<div class="cats-bar" id="cats-bar">
    <button class="cat-btn active" onclick="filterProd('الكل', this)">الكل</button>
    <button class="cat-btn wholesale-btn" onclick="filterProd('جملة', this)">📦 قسم الجملة</button>
    <button class="cat-btn" onclick="filterProd('مساج', this)">مساج</button>
    <button class="cat-btn" onclick="filterProd('أجهزة ضغط', this)">أجهزة ضغط</button>
    <button class="cat-btn" onclick="filterProd('تنفس', this)">تنفس</button>
    <button class="cat-btn" onclick="filterProd('مستلزمات', this)">مستلزمات</button>
</div>

<div class="cnt">
    <div class="grid" id="products-grid"></div>
</div>

<div id="pop-ov" class="pop-ov" onclick="closePop()">
    <div class="pop-pan" onclick="event.stopPropagation()">
        <button class="close-pop" onclick="closePop()"><i class="fas fa-times"></i></button>
        <div class="pop-img-h" id="pop-img-grid"></div>
        <h2 id="pop-title"></h2>
        <div class="desc-text" id="pop-desc"></div>
        <div class="pop-price-bar">
            <div class="pop-price"><span id="pop-price">0</span> ج.م</div>
            <button class="pop-add-btn" id="pop-add-btn">إضافة للسلة</button>
        </div>
    </div>
</div>

<nav class="b-nav">
    <a href="#" class="n-i active"><i class="fas fa-home"></i>المتجر</a>
    <a href="https://t.me/emmedical7" class="n-i"><i class="fab fa-telegram-plane"></i>تليجرام</a>
    <a href="javascript:void(0)" onclick="tglCart()" class="n-i"><i class="fas fa-shopping-basket"></i>السلة</a>
</nav>

<div id="ov" class="ov" onclick="tglCart()">
    <div class="pan" onclick="event.stopPropagation()">
        <h2 style="text-align:center; margin-bottom:20px; font-weight:900;">سلة المشتريات</h2>
        <div id="cl"></div>
        <div id="cs">
            <div style="display:flex; justify-content:space-between; margin:20px 0; font-weight:900; font-size:18px;">
                <span>الإجمالي</span><span><span id="tv">0</span> ج.م</span>
            </div>
            <button class="f-btn" onclick="sf()">تكملة الطلب</button>
        </div>
        <div id="ff" style="display:none;">
            <input type="text" id="un" placeholder="الاسم بالكامل" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid #eee; border-radius:12px; outline:none; background:#f9f9f9;">
            <input type="tel" id="up" placeholder="رقم الموبايل" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid #eee; border-radius:12px; outline:none; background:#f9f9f9;">
            <textarea id="ua" placeholder="العنوان بالتفصيل" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid #eee; border-radius:12px; outline:none; background:#f9f9f9; height:80px;"></textarea>
            <button class="f-btn" style="background:#25d366;" onclick="sw()">طلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>
</div>

<script>
    let allProd = [];
    let cart = JSON.parse(localStorage.getItem('em_medical_cart')) || [];
    let activeIntervals = new Map();

    async function load() {
        try {
            const res = await fetch('products.json?v=' + Date.now());
            allProd = await res.json();
            render(allProd);
        } catch (e) { console.error("Load failed"); }
    }

    function render(list) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';
        list.forEach((p, index) => {
            let imgs = p.imgs.map((img, i) => `<img src="${img}" class="${i===0?'active':''}" loading="lazy" decoding="async">`).join('');
            grid.innerHTML += `
                <div class="card" onclick="openPop(${index})" data-id="${index}">
                    <div class="img-h">${imgs}</div>
                    <h3>${p.n}</h3>
                    <div class="price">${p.p} ج.م</div>
                    <div class="card-btns">
                        <button class="viw-btn">التفاصيل</button>
                        <button class="add-btn-quick" onclick="event.stopPropagation(); add('${p.n}', ${p.p}, this)"><i class="fas fa-plus"></i></button>
                    </div>
                </div>`;
        });
        initSmartSlider();
    }

    function filterProd(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(cat === 'الكل') render(allProd);
        else render(allProd.filter(p => p.cat === cat));
    }

    function initSmartSlider() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const cardId = entry.target.dataset.id;
                if (entry.isIntersecting) startSlider(entry.target.querySelector('.img-h'), cardId);
                else stopSlider(cardId);
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    function startSlider(container, id) {
        if (activeIntervals.has(id)) return;
        const imgs = container.querySelectorAll('img');
        if (imgs.length <= 1) return;
        let i = 0;
        const interval = setInterval(() => {
            if(imgs[i]) imgs[i].classList.remove('active');
            i = (i + 1) % imgs.length;
            if(imgs[i]) imgs[i].classList.add('active');
        }, 3000);
        activeIntervals.set(id, interval);
    }

    function stopSlider(id) {
        if (activeIntervals.has(id)) {
            clearInterval(activeIntervals.get(id));
            activeIntervals.delete(id);
        }
    }

    function openPop(index) {
        const p = allProd[index];
        const ov = document.getElementById('pop-ov');
        document.getElementById('pop-img-grid').innerHTML = p.imgs.map((img, i) => `<img src="${img}" class="${i===0?'active':''}">`).join('');
        document.getElementById('pop-title').innerText = p.n;
        document.getElementById('pop-desc').innerHTML = p.desc.includes('،') ? `<ul><li>${p.desc.split('،').join('</li><li>')}</li></ul>` : p.desc;
        document.getElementById('pop-price').innerText = p.p;
        document.getElementById('pop-add-btn').onclick = () => { add(p.n, p.p, document.getElementById('pop-add-btn')); closePop(); };
        ov.classList.add('active');
        startSlider(document.getElementById('pop-img-grid'), 'popup');
    }

    function closePop() {
        document.getElementById('pop-ov').classList.remove('active');
        stopSlider('popup');
    }

    function add(n, p, b) {
        let i = cart.find(x => x.n === n);
        if(i) i.q++; else cart.push({n, p, q:1});
        localStorage.setItem('em_medical_cart', JSON.stringify(cart));
        upUI();
        let old = b.innerHTML; b.innerHTML = "✅";
        setTimeout(() => b.innerHTML = old, 800);
    }

    function upUI() {
        let b = document.getElementById('c-badge'), t = cart.reduce((s, i) => s + i.q, 0);
        b.style.display = t > 0 ? 'flex' : 'none'; b.innerText = t;
    }

    function ren() {
        let l = document.getElementById('cl'), sum = 0;
        if(!cart.length) { l.innerHTML = "<p style='text-align:center; padding:30px; color:#999;'>السلة فارغة</p>"; document.getElementById('tv').innerText=0; return; }
        let h = "";
        cart.forEach((i, x) => {
            sum += (i.p * i.q);
            h += `<div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${i.n}</div>
                        <div class="cart-item-price">${i.p} ج.م</div>
                    </div>
                    <div class="cart-qty-ctrl">
                        <button class="qty-btn" onclick="ch(${x},-1)">-</button>
                        <span style="margin:0 12px; font-weight:800;">${i.q}</span>
                        <button class="qty-btn" onclick="ch(${x},1)">+</button>
                    </div>
                  </div>`;
        });
        l.innerHTML = h; document.getElementById('tv').innerText = sum;
    }

    function ch(x, v) { cart[x].q += v; if(cart[x].q < 1) cart.splice(x,1); localStorage.setItem('em_medical_cart', JSON.stringify(cart)); upUI(); ren(); }
    function tglCart() { let m = document.getElementById('ov'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; bc(); ren(); }
    function sf() { document.getElementById('cs').style.display='none'; document.getElementById('ff').style.display='block'; }
    function bc() { document.getElementById('cs').style.display='block'; document.getElementById('ff').style.display='none'; }
    
    function sw() {
        let n = document.getElementById('un').value, p = document.getElementById('up').value, a = document.getElementById('ua').value;
        if(!n || !p || !a) return alert("من فضلك أكمل البيانات");
        let msg = `طلب جديد من Em Medical:%0A👤 الاسم: ${n}%0A📞 الموبايل: ${p}%0A📍 العنوان: ${a}%0A%0A🛒 الطلبات:%0A`;
        cart.forEach(i => msg += `• ${i.n} (العدد: ${i.q})%0A`);
        msg += `%0A💰 الإجمالي: ${document.getElementById('tv').innerText} ج.م`;
        window.open(`https://wa.me/201153951440?text=${msg}`);
    }

    window.onload = () => { load(); upUI(); }
</script>
</body>
</html>
