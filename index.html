<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical | القوة في الرعاية الصحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root { 
            --p: #0052cc; 
            --s: #00a884;
            --bg: #f4f7fa; 
            --w: #ffffff; 
            --text: #1c1e21; 
            --gray: #65676b; 
            --shd: 0 8px 24px rgba(149, 157, 165, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); padding-bottom: 90px; overflow-x: hidden; color: var(--text); }

        /* هيدر المتجر */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            height: 70px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #eee;
        }
        .logo img { height: 40px; }
        .c-icon { 
            background: var(--p); width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; position: relative;
        }
        #c-badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; border: 2px solid #fff; }

        /* شريط الأقسام - تم حذف "الجملة" */
        .cats-bar { 
            display: flex; gap: 10px; overflow-x: auto; padding: 15px; 
            background: var(--w); position: sticky; top: 70px; z-index: 999; 
            scrollbar-width: none; border-bottom: 1px solid #eee;
        }
        .cats-bar::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: #f0f2f5; color: var(--gray); padding: 8px 20px; 
            border-radius: 50px; border: none; font-weight: 700; 
            white-space: nowrap; cursor: pointer; font-size: 13px;
        }
        .cat-btn.active { background: var(--p); color: #fff; }

        /* شبكة المنتجات */
        .cnt { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .card { 
            background: var(--w); border-radius: 20px; padding: 12px; 
            display: flex; flex-direction: column; box-shadow: var(--shd); 
            position: relative; overflow: hidden; 
        }
        
        .badge { position: absolute; top: 10px; right: 10px; background: var(--p); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 6px; z-index: 5; font-weight: 800; }
        .img-h { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .img-h img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card h3 { font-size: 13px; font-weight: 800; min-height: 38px; margin-bottom: 5px; line-height: 1.4; text-align: center; }
        .price { color: var(--p); font-weight: 900; font-size: 15px; text-align: center; margin-bottom: 10px; }
        
        .card-btns { display: flex; gap: 6px; }
        .viw-btn { background: #f8f9fa; border: 1px solid #eee; flex: 1; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 11px; }
        .add-btn { background: var(--p); color: #fff; border: none; width: 40px; border-radius: 10px; cursor: pointer; font-size: 14px; }

        /* البرواز السفلي المقطّع كما في الصورة */
        .wholesale-footer-box {
            margin: 25px 15px;
            padding: 25px 15px;
            background: #fff;
            border: 2px dashed #d1d9e6;
            border-radius: 20px;
            text-align: center;
        }
        .wholesale-footer-box h4 {
            color: var(--p);
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .wholesale-footer-box p {
            color: var(--gray);
            font-size: 13px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* سلة الطلبات */
        .ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; backdrop-filter: blur(4px); }
        .pan { background: var(--w); width: 100%; position: absolute; bottom: 0; border-radius: 25px 25px 0 0; padding: 25px; }
        .f-btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="logo.png" alt="Em Medical"></div>
    <div class="c-icon" onclick="tglCart()"><i class="fas fa-shopping-basket"></i><span id="c-badge">0</span></div>
</header>

<div class="cats-bar">
    <button class="cat-btn active" onclick="filterProd('الكل', this)">الكل</button>
    <button class="cat-btn" onclick="filterProd('مساج', this)">مساج</button>
    <button class="cat-btn" onclick="filterProd('أجهزة ضغط', this)">أجهزة ضغط</button>
    <button class="cat-btn" onclick="filterProd('تنفس', this)">تنفس</button>
</div>

<div class="cnt">
    <div class="grid" id="products-grid"></div>
</div>

<div class="wholesale-footer-box">
    <h4>📦 متوفر أسعار خاصة للكميات</h4>
    <p>تواصل معنا مباشرة للحصول على عرض سعر<br>خاص بالموزعين والصيدليات.</p>
</div>

<div id="ov" class="ov" onclick="tglCart()">
    <div class="pan" onclick="event.stopPropagation()">
        <h2 style="margin-bottom:15px; font-weight:900;">🛒 سلة طلباتك</h2>
        <div id="cl"></div>
        <div id="cs">
            <div style="display:flex; justify-content:space-between; margin:15px 0; font-weight:900; font-size:18px;">
                <span>الإجمالي</span><span><span id="tv">0</span> ج.م</span>
            </div>
            <button class="f-btn" onclick="sf()">إتمام الطلب</button>
        </div>
        <div id="ff" style="display:none;">
            <input type="text" id="un" placeholder="الاسم" style="width:100%; padding:14px; margin-bottom:10px; border-radius:10px; border:1px solid #eee;">
            <input type="tel" id="up" placeholder="رقم الموبايل" style="width:100%; padding:14px; margin-bottom:10px; border-radius:10px; border:1px solid #eee;">
            <button class="f-btn" style="background:#25d366" onclick="sw()">إرسال واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>
</div>

<script>
    // المنتجات - يمكنك تعديل الصور والأسماء هنا
    const allProd = [
        { "n": "جهاز مساج ريلاكس آند سبين المطور", "p": 450, "cat": "مساج", "img": "p1.png", "b": "أكثر مبيعاً" },
        { "n": "قاعدة Egg Sitter المريحة", "p": 500, "cat": "مساج", "img": "p2.png", "b": "أكثر مبيعاً" },
        { "n": "وسادة تدفئة كهربائية", "p": 850, "cat": "مساج", "img": "p3.png", "b": "" },
        { "n": "جهاز قياس ضغط الدم الناطق", "p": 2100, "cat": "أجهزة ضغط", "img": "p4.png", "b": "" }
    ];

    let cart = [];

    function render(list) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = list.map(p => `
            <div class="card">
                ${p.b ? `<div class="badge">${p.b}</div>` : ''}
                <div class="img-h"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=EM+Medical'"></div>
                <h3>${p.n}</h3>
                <div class="price">${p.p} ج.م</div>
                <div class="card-btns">
                    <button class="viw-btn">عرض</button>
                    <button class="add-btn" onclick="add('${p.n}', ${p.p})"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function add(n, p) {
        let i = cart.find(x => x.n === n);
        if(i) i.q++; else cart.push({n, p, q:1});
        upUI();
    }

    function upUI() {
        let b = document.getElementById('c-badge'), t = cart.reduce((s, i) => s + i.q, 0);
        b.style.display = t > 0 ? 'flex' : 'none'; b.innerText = t;
    }

    function ren() {
        let l = document.getElementById('cl'), sum = 0;
        l.innerHTML = cart.map((i, x) => {
            sum += (i.p * i.q);
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #f5f5f5; padding-bottom:5px;">
                <span style="font-size:12px; font-weight:700;">${i.n}</span>
                <span style="font-weight:900;">${i.q} × ${i.p} ج.م</span>
            </div>`;
        }).join('');
        document.getElementById('tv').innerText = sum;
    }

    function tglCart() { let m = document.getElementById('ov'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; ren(); }
    
    function filterProd(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat === 'الكل' ? allProd : allProd.filter(p => p.cat === cat));
    }

    function sf() { document.getElementById('cs').style.display='none'; document.getElementById('ff').style.display='block'; }
    
    function sw() {
        let n = document.getElementById('un').value, p = document.getElementById('up').value;
        if(!n || !p) return alert("يرجى إدخال البيانات");
        let msg = `طلب جديد من EM Medical%0A👤 الاسم: ${n}%0A📞 الموبايل: ${p}%0A%0A📦 المنتجات:%0A`;
        cart.forEach(i => msg += `• ${i.n} (العدد: ${i.q})%0A`);
        msg += `%0A💰 الإجمالي: ${document.getElementById('tv').innerText} ج.م`;
        window.open(`https://wa.me/201153951440?text=${msg}`);
    }

    window.onload = () => render(allProd);
</script>
</body>
</html>
