<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #0062cc; --s: #28a745; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; overflow-x: hidden; }
        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .cart-trigger { position: relative; cursor: pointer; }
        #badge { position: absolute; top: -5px; right: -8px; background: red; color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 10px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #eee; }
        .slider { position: relative; height: 150px; overflow: hidden; touch-action: pan-y; }
        .slides { display: flex; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; }
        .slides img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; pointer-events: none; }
        .details { padding: 8px; text-align: center; flex: 1; }
        .details h3 { font-size: 11px; margin: 5px 0; height: 30px; color: #333; }
        .price { color: var(--p); font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; }
        .btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #cart-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; }
        .cart-content { background: #fff; width: 100%; position: absolute; bottom: 0; border-radius: 20px 20px 0 0; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<header>
    <img src="logo.png" style="height:30px;">
    <div class="cart-trigger" onclick="showCart()"><i class="fas fa-shopping-cart" style="font-size:20px;color:var(--p)"></i><span id="badge">0</span></div>
</header>
<div class="container">
    <div class="card">
        <div class="slider"><div class="slides"><img src="6.PNG"></div></div>
        <div class="details"><h3>جهاز STAR للتنفس</h3><span class="price">1100 ج.م</span><button class="btn" onclick="add('نيبولايزر STAR',1100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" ontouchstart="start(event)" ontouchend="end(event, this)"><div class="slides auto-v"><img src="2.PNG"><img src="2-2.PNG"></div></div>
        <div class="details"><h3>شاشة القياس الرقمية</h3><span class="price">2100 ج.م</span><button class="btn" onclick="add('شاشة قياس',2100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider"><div class="slides"><img src="1.PNG"></div></div>
        <div class="details"><h3>وسادة الاسترخاء</h3><span class="price">850 ج.م</span><button class="btn" onclick="add('وسادة الاسترخاء',850)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" ontouchstart="start(event)" ontouchend="end(event, this)"><div class="slides auto-v"><img src="3.PNG"><img src="3-2.PNG"></div></div>
        <div class="details"><h3>جهاز Thrive المنزلي</h3><span class="price">1100 ج.م</span><button class="btn" onclick="add('جهاز Thrive',1100)">أضف للسلة</button></div>
    </div>
</div>
<div id="cart-ui" onclick="showCart()">
    <div class="cart-content" onclick="event.stopPropagation()">
        <h4 style="text-align:center;margin:0 0 15px">سلتك</h4>
        <div id="list"></div>
        <hr><div style="display:flex;justify-content:space-between;font-weight:bold"><span>الإجمالي:</span><span><span id="total">0</span> ج.م</span></div>
        <button onclick="goWA()" style="width:100%;background:var(--s);color:#fff;border:none;padding:15px;border-radius:10px;margin-top:10px;font-weight:bold">تأكيد واتساب</button>
    </div>
</div>
<div class="nav"><a href="#" style="color:var(--p)"><i class="fas fa-home"></i></a><a href="https://t.me/emmedical7" style="color:#999"><i class="fab fa-telegram"></i></a></div>
<script>
    let cart = [], xS = 0;
    // وظيفة اللمس (Swipe)
    function start(e) { xS = e.touches[0].clientX; }
    function end(e, el) {
        let xE = e.changedTouches[0].clientX;
        if (Math.abs(xS - xE) > 30) { 
            const s = el.querySelector('.slides');
            s.style.transform = s.style.transform === 'translateX(100%)' ? 'translateX(0)' : 'translateX(100%)';
        }
    }
    // الحركة التلقائية
    setInterval(() => {
        document.querySelectorAll('.auto-v').forEach(s => {
            s.style.transform = s.style.transform === 'translateX(100%)' ? 'translateX(0)' : 'translateX(100%)';
        });
    }, 4000);

    function add(n, p) { cart.push({n, p}); update(); }
    function update() { document.getElementById('badge').innerText = cart.length; }
    function showCart() {
        const ui = document.getElementById('cart-ui');
        ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        if(ui.style.display === 'block') render();
    }
    function render() {
        let h = "", t = 0;
        cart.forEach((i, x) => {
            h += `<div class="cart-item"><span>${i.n}</span><button onclick="del(${x})" style="color:red;border:none;background:none"><i class="fas fa-trash"></i></button></div>`;
            t += i.p;
        });
        document.getElementById('list').innerHTML = h || "السلة فارغة";
        document.getElementById('total').innerText = t;
    }
    function del(x) { cart.splice(x, 1); update(); render(); }
    function goWA() {
        if(!cart.length) return;
        let m = "طلب جديد:%0A";
        cart.forEach(i => m += `- ${i.n} (${i.p} ج.م)%0A`);
        window.open(`https://wa.me/201153951440?text=${m}%0Aالإجمالي: ${document.getElementById('total').innerText} ج.م`);
    }
</script>
</body>
</html>
