<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical | الصفحة الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --p: #0052cc; --s: #00a884; --bg: #f4f7fa; --w: #ffffff; --text: #1c1e21; --gray: #65676b; --shd: 0 8px 24px rgba(149, 157, 165, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); padding-bottom: 120px; overflow-x: hidden; color: var(--text); }

        header { background: #fff; height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo img { height: 45px; }
        .c-icon { background: var(--p); width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; position: relative; cursor: pointer; }
        #c-badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; border: 2px solid #fff; }

        .cats-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; background: #fff; position: sticky; top: 75px; z-index: 999; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .cats-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #f0f2f5; color: var(--gray); padding: 10px 22px; border-radius: 50px; border: none; font-weight: 700; white-space: nowrap; cursor: pointer; font-size: 13px; }
        .cat-btn.active { background: var(--p); color: #fff; }

        .cnt { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .card { background: #fff; border-radius: 22px; padding: 15px; display: flex; flex-direction: column; box-shadow: var(--shd); position: relative; overflow: hidden; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--p); color: #fff; font-size: 10px; padding: 4px 10px; border-radius: 8px; z-index: 5; font-weight: 800; }

        .img-h { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .img-h img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card h3 { font-size: 14px; font-weight: 800; min-height: 40px; margin-bottom: 5px; line-height: 1.4; text-align: center; }
        .price { color: var(--p); font-weight: 900; font-size: 16px; text-align: center; margin-bottom: 10px; }
        
        .card-btns { display: flex; gap: 8px; }
        .viw-btn { background: #f8f9fa; border: 1px solid #eee; flex: 1; padding: 10px; border-radius: 12px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .add-btn { background: var(--p); color: #fff; border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; }

        /* السطر اللي طلبته تحت */
        .wholesale-footer {
            margin: 30px 20px;
            padding: 20px;
            background: #fff;
            border: 2px dashed #ddd;
            border-radius: 20px;
            text-align: center;
            color: var(--gray);
        }
        .wholesale-footer b { color: var(--p); display: block; font-size: 18px; margin-bottom: 5px; }

        /* سلة الطلبات */
        .ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px); }
        .pan { background: #fff; width: 100%; position: absolute; bottom: 0; border-radius: 25px 25px 0 0; padding: 25px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .f-btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 16px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="logo.png" alt="Em Medical"></div>
    <div class="c-icon" onclick="tglCart()"><i class="fas fa-shopping-basket"></i><span id="c-badge">0</span></div>
</header>

<div class="cats-bar">
    <button class="cat-btn active" onclick="filterProd('الكل', this)">الكل</button>
    <button class="cat-btn" onclick="filterProd('مساج', this)">مساج</button>
    <button class="cat-btn" onclick="filterProd('أجهزة ضغط', this)">أجهزة ضغط</button>
    <button class="cat-btn" onclick="filterProd('تنفس', this)">تنفس</button>
</div>

<div class="cnt">
    <div class="grid" id="products-grid"></div>
</div>

<div class="wholesale-footer">
    <b>📦 متوفر أسعار خاصة للكميات</b>
    تواصل معنا مباشرة للحصول على عرض سعر خاص بالموزعين والصيدليات.
</div>

<div id="ov" class="ov" onclick="tglCart()">
    <div class="pan" onclick="event.stopPropagation()">
        <h2 style="margin-bottom:20px;">🛒 سلة طلباتك</h2>
        <div id="cl"></div>
        <div id="cs">
            <div style="display:flex; justify-content:space-between; margin:15px 0; font-weight:900; font-size:18px;">
                <span>الإجمالي</span><span><span id="tv">0</span> ج.م</span>
            </div>
            <button class="f-btn" onclick="sf()">إتمام الطلب</button>
        </div>
        <div id="ff" style="display:none;">
            <input type="text" id="un" placeholder="الاسم" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee;">
            <input type="tel" id="up" placeholder="الموبايل" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee;">
            <button class="f-btn" style="background:#25d366" onclick="sw()">إرسال عبر واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>
</div>

<script>
    const allProd = [
        { "n": "جهاز قياس ضغط الدم الناطق", "p": 2100, "cat": "أجهزة ضغط", "img": "p1.png", "b": "أكثر مبيعاً" },
        { "n": "وسادة تدفئة كهربائية", "p": 850, "cat": "مساج", "img": "p2.png", "b": "" },
        { "n": "جهاز مساج ريلاكس المطور", "p": 450, "cat": "مساج", "img": "p3.png", "b": "خصم" },
        { "n": "قاعدة Egg Sitter المريحة", "p": 500, "cat": "مساج", "img": "p4.png", "b": "" }
    ];

    let cart = [];

    function render(list) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = list.map(p => `
            <div class="card">
                ${p.b ? `<div class="badge">${p.b}</div>` : ''}
                <div class="img-h"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=EM+Medical'"></div>
                <h3>${p.n}</h3>
                <div class="price">${p.p} ج.م</div>
                <div class="card-btns">
                    <button class="viw-btn">عرض</button>
                    <button class="add-btn" onclick="add('${p.n}', ${p.p})"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function add(n, p) {
        let i = cart.find(x => x.n === n);
        if(i) i.q++; else cart.push({n, p, q:1});
        upUI();
    }

    function upUI() {
        let t = cart.reduce((s, i) => s + i.q, 0);
        document.getElementById('c-badge').style.display = t > 0 ? 'flex' : 'none';
        document.getElementById('c-badge').innerText = t;
    }

    function ren() {
        let l = document.getElementById('cl'), sum = 0;
        l.innerHTML = cart.map((i, x) => {
            sum += (i.p * i.q);
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <div style="font-size:13px;"><b>${i.n}</b><br>${i.p} ج.م</div>
                <div>
                    <button onclick="ch(${x},-1)" style="width:25px;">-</button>
                    <span style="margin:0 5px;">${i.q}</span>
                    <button onclick="ch(${x},1)" style="width:25px;">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('tv').innerText = sum;
    }

    function ch(x, v) { cart[x].q += v; if(cart[x].q < 1) cart.splice(x,1); upUI(); ren(); }
    function tglCart() { let m = document.getElementById('ov'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; ren(); }
    function filterProd(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat === 'الكل' ? allProd : allProd.filter(p => p.cat === cat));
    }
    function sf() { document.getElementById('cs').style.display='none'; document.getElementById('ff').style.display='block'; }
    function sw() {
        let n = document.getElementById('un').value, p = document.getElementById('up').value;
        if(!n || !p) return alert("البيانات ناقصة");
        let msg = `طلب جديد من EM Medical%0Aالاسم: ${n}%0Aالموبايل: ${p}%0A%0Aالمنتجات:%0A`;
        cart.forEach(i => msg += `• ${i.n} (العدد: ${i.q})%0A`);
        window.open(`https://wa.me/201153951440?text=${msg}`);
    }

    window.onload = () => render(allProd);
</script>
</body>
</html>
