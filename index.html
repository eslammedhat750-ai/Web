<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Medical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0062cc; --s: #28a745; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; text-align: right; direction: rtl; }
        header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .cart-trigger { position: relative; cursor: pointer; }
        #badge { position: absolute; top: -5px; right: -8px; background: red; color: #fff; font-size: 11px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; border: 2px solid #fff; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .slider { position: relative; height: 150px; overflow: hidden; background: #fff; }
        .slides { display: flex; transition: 0.5s ease-in-out; width: 100%; height: 100%; }
        .slides img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; padding: 5px; }
        .details { padding: 10px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .details h3 { font-size: 12px; margin: 0 0 8px; height: 34px; overflow: hidden; color: #333; line-height: 1.4; }
        .price { color: var(--p); font-weight: 800; display: block; margin-bottom: 10px; font-size: 14px; }
        .btn { background: var(--p); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #cart-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; backdrop-filter: blur(4px); }
        .cart-content { background: #fff; width: 100%; position: absolute; bottom: 0; border-radius: 25px 25px 0 0; padding: 20px; max-height: 75vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .del-btn { color: #ff3b30; background: #fff1f0; border: 1px solid #ffccc7; padding: 8px; border-radius: 8px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; z-index: 1000; }
        .nav a { color: #999; text-decoration: none; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" style="height:30px;">
    <div class="cart-trigger" onclick="showCart()">
        <i class="fas fa-shopping-basket" style="font-size:24px; color:var(--p)"></i>
        <span id="badge">0</span>
    </div>
</header>

<div class="container">
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="5.PNG"><img src="5-2.PNG"></div></div>
        <div class="details"><h3>جهاز القياس المتطور</h3><span class="price">3200 ج.م</span><button class="btn" onclick="addItem(this,'جهاز قياس 3200',3200)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider"><div class="slides"><img src="6.PNG"></div></div>
        <div class="details"><h3>جهاز STAR للتنفس</h3><span class="price">1100 ج.م</span><button class="btn" onclick="addItem(this,'STAR',1100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="2.PNG"><img src="2-2.PNG"></div></div>
        <div class="details"><h3>شاشة القياسات الرقمية</h3><span class="price">2100 ج.م</span><button class="btn" onclick="addItem(this,'شاشة قياس 2100',2100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="3.PNG"><img src="3-2.PNG"></div></div>
        <div class="details"><h3>جهاز Thrive للمساج</h3><span class="price">1100 ج.م</span><button class="btn" onclick="addItem(this,'Thrive',1100)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider" onclick="slide(this)"><div class="slides auto-v"><img src="4.PNG"><img src="4-2.PNG"></div></div>
        <div class="details"><h3>جهاز المساج المائي</h3><span class="price">1200 ج.م</span><button class="btn" onclick="addItem(this,'مساج مائي',1200)">أضف للسلة</button></div>
    </div>
    <div class="card">
        <div class="slider"><div class="slides"><img src="1.PNG"></div></div>
        <div class="details"><h3>وسادة الاسترخاء</h3><span class="price">850 ج.م</span><button class="btn" onclick="addItem(this,'وسادة',850)">أضف للسلة</button></div>
    </div>
</div>

<div id="cart-ui" onclick="showCart()">
    <div class="cart-content" onclick="event.stopPropagation()">
        <h3 style="text-align:center; margin-bottom:20px;">سلتك</h3>
        <div id="list"></div>
        <div style="margin-top:15px; padding:15px 0; border-top:2px solid #eee; display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
            <span>الإجمالي:</span><span><span id="total">0</span> ج.م</span>
        </div>
        <button onclick="goWA()" style="width:100%; background:var(--s); color:#fff; border:none; padding:18px; border-radius:15px; margin-top:15px; font-weight:bold;">تأكيد الطلب (واتساب)</button>
    </div>
</div>

<div class="nav">
    <a href="#" style="color:var(--p)"><i class="fas fa-home"></i></a>
    <a href="https://t.me/emmedical7" target="_blank"><i class="fab fa-telegram"></i></a>
    <a href="javascript:void(0)" onclick="showCart()"><i class="fas fa-shopping-basket"></i></a>
</div>

<script>
    let cart = [];
    function slide(el) {
        const s = el.querySelector('.slides');
        if(!s) return;
        s.style.transform = (s.style.transform === 'translateX(100%)') ? 'translateX(0)' : 'translateX(100%)';
    }
    setInterval(() => { document.querySelectorAll('.auto-v').forEach(s => slide(s.parentElement)); }, 4000);

    function addItem(btn, n, p) {
        cart.push({n, p});
        document.getElementById('badge').innerText = cart.length;
        btn.innerHTML = "تم ✅"; btn.style.background = "var(--s)";
        setTimeout(() => { btn.innerHTML = "أضف للسلة"; btn.style.background = "var(--p)"; }, 800);
    }

    function showCart() {
        const ui = document.getElementById('cart-ui');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
        if(ui.style.display === 'block') renderCart();
    }

    function renderCart() {
        let html = "", total = 0;
        if(cart.length === 0) { html = "<p style='text-align:center; padding:20px;'>السلة فارغة</p>"; } 
        else {
            cart.forEach((item, index) => {
                html += `<div class="cart-item">
                    <div style="text-align:right"><b>${item.n}</b><br><small>${item.p} ج.م</small></div>
                    <button class="del-btn" onclick="deleteItem(${index})"><i class="fas fa-trash-can"></i></button>
                </div>`;
                total += item.p;
            });
        }
        document.getElementById('list').innerHTML = html;
        document.getElementById('total').innerText = total;
    }

    function deleteItem(index) {
        cart.splice(index, 1);
        document.getElementById('badge').innerText = cart.length;
        renderCart();
    }

    function goWA() {
        if(cart.length === 0) return;
        let msg = "طلب جديد من Em Medical:%0A";
        cart.forEach((item, i) => msg += `${i+1}- ${item.n} (${item.p} ج.م)%0A`);
        window.open(`https://wa.me/201153951440?text=${msg}%0A💰 الإجمالي: ${document.getElementById('total').innerText} ج.م`);
    }
</script>
</body>
</html>
