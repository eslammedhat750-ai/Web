<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Medical Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0056b3; --secondary: #28a745; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #eee; padding-bottom: 50px; }
        
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .menu-icon { font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; }
        #cart-count { position: absolute; top: -10px; right: -10px; background: #ff3b30; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; }

        /* القائمة الجانبية */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; right: 0; background-color: #1a1a1a; overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #ccc; display: block; transition: 0.3s; border-bottom: 1px solid #333; }
        .sidebar a:hover { color: white; background: #333; }
        .sidebar .closebtn { position: absolute; top: 10px; left: 20px; font-size: 30px; color: white; cursor: pointer; }

        /* المنتجات */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* سلايدر الصور */
        .slider { position: relative; overflow: hidden; border-radius: 10px; height: 250px; margin-bottom: 10px; background: #fff; }
        .slider img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .slider img.active { display: block; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.2); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%; font-weight: bold; }
        .prev { left: 5px; }
        .next { right: 5px; }

        .price { color: var(--secondary); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        
        /* السلة */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; width: 90%; max-width: 450px; margin: 50px auto; padding: 20px; border-radius: 20px; position: relative; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .checkout-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 1.2rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
  <span class="closebtn" onclick="closeNav()">&times;</span>
  <a href="#"><i class="fas fa-home"></i> الرئيسية</a>
  <a href="#"><i class="fas fa-stethoscope"></i> أجهزة طبية</a>
  <a href="#"><i class="fas fa-hand-sparkles"></i> أجهزة مساج</a>
  <a href="https://wa.me/201153951440"><i class="fab fa-whatsapp"></i> تواصل معنا</a>
</div>

<header>
    <div class="menu-icon" onclick="openNav()"><i class="fas fa-bars"></i> قائمة</div>
    <h1 style="margin:0; font-size: 1.4rem;">Em Medical</h1>
    <div class="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<div class="container">
    <div class="product-card">
        <div class="slider" id="s1">
            <img src="1.PNG" class="active">
            <img src="1-1.PNG">
            <button class="slider-btn prev" onclick="moveSlide(-1, 's1')">&#10094;</button>
            <button class="slider-btn next" onclick="moveSlide(1, 's1')">&#10095;</button>
        </div>
        <h3>قربة حرارية كهربائية</h3>
        <p class="price">850 ج.م</p>
        <button class="add-btn" onclick="addToCart('قربة حرارية', 850)">أضف للسلة</button>
    </div>

    <div class="product-card">
        <div class="slider" id="s2">
            <img src="2.PNG" class="active">
            <img src="2-1.PNG">
            <button class="slider-btn prev" onclick="moveSlide(-1, 's2')">&#10094;</button>
            <button class="slider-btn next" onclick="moveSlide(1, 's2')">&#10095;</button>
        </div>
        <h3>جهاز ضغط Omron M1</h3>
        <p class="price">2100 ج.م</p>
        <button class="add-btn" onclick="addToCart('جهاز ضغط Omron', 2100)">أضف للسلة</button>
    </div>

    <div class="product-card">
        <div class="slider" id="s3">
            <img src="3.PNG" class="active">
            <img src="3-1.PNG">
            <button class="slider-btn prev" onclick="moveSlide(-1, 's3')">&#10094;</button>
            <button class="slider-btn next" onclick="moveSlide(1, 's3')">&#10095;</button>
        </div>
        <h3>جهاز مساج Thrive 717</h3>
        <p class="price">1100 ج.م</p>
        <button class="add-btn" onclick="addToCart('مساج Thrive', 1100)">أضف للسلة</button>
    </div>

    <div class="product-card">
        <div class="slider" id="s4">
            <img src="4.PNG" class="active">
            <img src="4-1.PNG">
            <button class="slider-btn prev" onclick="moveSlide(-1, 's4')">&#10094;</button>
            <button class="slider-btn next" onclick="moveSlide(1, 's4')">&#10095;</button>
        </div>
        <h3>شنطة مساج MDHL</h3>
        <p class="price">3200 ج.م</p>
        <button class="add-btn" onclick="addToCart('شنطة مساج MDHL', 3200)">أضف للسلة</button>
    </div>

    <div class="product-card">
        <div class="slider" id="s5">
            <img src="5.PNG" class="active">
            <img src="5-1.PNG">
            <button class="slider-btn prev" onclick="moveSlide(-1, 's5')">&#10094;</button>
            <button class="slider-btn next" onclick="moveSlide(1, 's5')">&#10095;</button>
        </div>
        <h3>جهاز مساج الوجه</h3>
        <p class="price">750 ج.م</p>
        <button class="add-btn" onclick="addToCart('مساج وجه بنك', 750)">أضف للسلة</button>
    </div>
</div>

<div id="cart-modal">
    <div class="modal-content">
        <h2 style="text-align:center; color:var(--primary);">سلة المشتريات</h2>
        <div id="cart-items-list"></div>
        <div style="border-top:2px solid #eee; margin-top:15px; padding-top:15px; font-weight:bold; display:flex; justify-content:space-between; font-size:1.2rem;">
            <span>الإجمالي:</span>
            <span><span id="total-price">0</span> ج.م</span>
        </div>
        <button class="checkout-btn" onclick="sendToWhatsapp()">إتمام الطلب عبر واتساب</button>
        <button onclick="toggleCart()" style="width:100%; margin-top:10px; background:#f0f0f0; border:none; padding:10px; border-radius:10px; cursor:pointer;">إغلاق</button>
    </div>
</div>

<script>
    let cart = [];
    const phone = "201153951440";

    function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

    function moveSlide(n, sliderId) {
        let slider = document.getElementById(sliderId);
        let imgs = slider.getElementsByTagName('img');
        let activeIdx = 0;
        for(let i=0; i<imgs.length; i++) {
            if(imgs[i].classList.contains('active')) {
                activeIdx = i;
                imgs[i].classList.remove('active');
                break;
            }
        }
        activeIdx = (activeIdx + n + imgs.length) % imgs.length;
        imgs[activeIdx].classList.add('active');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateUI();
        alert("تمت الإضافة للسلة بنجاح ✅");
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let list = document.getElementById('cart-items-list');
        list.innerHTML = cart.length === 0 ? "<p style='text-align:center;'>السلة فارغة</p>" : "";
        let total = 0;
        cart.forEach((item) => {
            total += item.price;
            list.innerHTML += `<div class="cart-item"><span>${item.name}</span><span>${item.price} ج.م</span></div>`;
        });
        document.getElementById('total-price').innerText = total;
    }

    function toggleCart() {
        let modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === "block" ? "none" : "block";
    }

    function sendToWhatsapp() {
        if(cart.length === 0) return alert("السلة فارغة!");
        let msg = "*طلب جديد من Em Medical*%0a";
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0a`);
        msg += `%0a*الإجمالي:* ${document.getElementById('total-price').innerText} ج.م`;
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
