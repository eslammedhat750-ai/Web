<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Medical Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0056b3; --secondary: #28a745; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #eee; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; margin-left: 20px; }
        #cart-count { position: absolute; top: -10px; right: -10px; background: #ff3b30; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .price { color: var(--secondary); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }
        
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 450px; margin: 40px auto; padding: 25px; border-radius: 20px; position: relative; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 1.1rem; }
        .checkout-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 1.2rem; font-weight: bold; margin-top: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .close-cart { background: #f0f0f0; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="width: 50px;"></div>
    <h1 style="margin:0;">Em Medical</h1>
    <div class="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<div class="container">
    <div class="product-card">
        <h3>قربة حرارية كهربائية</h3>
        <p class="price">850 ج.م</p>
        <button class="add-btn" onclick="addToCart('قربة حرارية', 850)">أضف للسلة <i class="fas fa-plus"></i></button>
    </div>
    <div class="product-card">
        <h3>جهاز ضغط Omron M1</h3>
        <p class="price">2100 ج.م</p>
        <button class="add-btn" onclick="addToCart('جهاز ضغط Omron', 2100)">أضف للسلة <i class="fas fa-plus"></i></button>
    </div>
    <div class="product-card">
        <h3>جهاز مساج Thrive 717</h3>
        <p class="price">1100 ج.م</p>
        <button class="add-btn" onclick="addToCart('مساج Thrive', 1100)">أضف للسلة <i class="fas fa-plus"></i></button>
    </div>
    <div class="product-card">
        <h3>شنطة مساج MDHL</h3>
        <p class="price">3200 ج.م</p>
        <button class="add-btn" onclick="addToCart('شنطة مساج MDHL', 3200)">أضف للسلة <i class="fas fa-plus"></i></button>
    </div>
    <div class="product-card">
        <h3>جهاز مساج الوجه</h3>
        <p class="price">750 ج.م</p>
        <button class="add-btn" onclick="addToCart('مساج وجه بنك', 750)">أضف للسلة <i class="fas fa-plus"></i></button>
    </div>
</div>

<div id="cart-modal">
    <div class="modal-content">
        <h2 style="text-align:center; color: var(--primary);">طلباتك المختارة</h2>
        <div id="cart-items-list" style="margin: 20px 0;"></div>
        <div style="font-size: 1.3rem; font-weight: bold; border-top: 2px solid var(--primary); padding-top: 15px; display: flex; justify-content: space-between;">
            <span>الإجمالي:</span>
            <span><span id="total-price">0</span> ج.م</span>
        </div>
        <button class="checkout-btn" onclick="sendToWhatsapp()">
            <i class="fab fa-whatsapp"></i> إتمام الطلب (واتساب)
        </button>
        <button class="close-cart" onclick="toggleCart()">إكمال التسوق</button>
    </div>
</div>

<script>
    let cart = [];
    let phone = "201153951440"; 

    function addToCart(name, price) {
        cart.push({name, price});
        updateCartUI();
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = "تمت الإضافة ✓";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = "#0056b3";
        }, 1000);
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let list = document.getElementById('cart-items-list');
        list.innerHTML = cart.length === 0 ? "<p style='text-align:center;'>السلة فارغة</p>" : "";
        let total = 0;
        cart.forEach((item) => {
            total += item.price;
            list.innerHTML += `<div class="cart-item"><span>${item.name}</span> <span>${item.price} ج.م</span></div>`;
        });
        document.getElementById('total-price').innerText = total;
    }

    function toggleCart() {
        let modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === "block" ? "none" : "block";
    }

    function sendToWhatsapp() {
        if(cart.length === 0) {
            alert("السلة فارغة! اختار منتجات الأول.");
            return;
        }
        let message = "*طلب جديد من متجر Em Medical*%0a--------------------------%0a";
        let total = 0;
        cart.forEach((item, index) => {
            message += `*${index+1}-* ${item.name} (${item.price} ج.م)%0a`;
            total += item.price;
        });
        message += "--------------------------%0a";
        message += `*الإجمالي:* ${total} ج.م%0a%0a*برجاء تأكيد الطلب لتجهيز الشحن.*`;
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
