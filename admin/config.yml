backend:
  name: github
  repo: eslammedhat750-ai/Web
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "المنتجات"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "اسم المنتج", name: "title", widget: "string" }
      - { label: "السعر", name: "price", widget: "number" }
      - { label: "الوصف", name: "body", widget: "markdown" }
      - { label: "صورة المنتج", name: "image", widget: "image" }
