backend:
  name: github
  repo: eslammedhat750-ai/Web # تأكد أن هذا اسم المستودع الصحيح
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

collections:
  - name: "settings"
    label: "الإعدادات"
    delete: false
    editor:
      preview: false
    files:
      - name: "products"
        label: "منتجات Em Medical"
        file: "products.json"
        fields:
          - { label: "قائمة المنتجات", name: "products", widget: "list", fields: [
              { label: "اسم الجهاز", name: "n", widget: "string" },
              { label: "السعر", name: "p", widget: "number" },
              { label: "القسم", name: "cat", widget: "string" },
              { label: "وصف سريع", name: "desc", widget: "text" },
              { label: "صورة المنتج", name: "imgs", widget: "list", field: { label: "اسم الصورة", widget: "string" } }
            ]
          }
