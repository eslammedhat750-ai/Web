backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "المنتجات"
    folder: "public"
    file: "public/products.json"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "اسم المنتج", name: "n", widget: "string" }
      - { label: "السعر", name: "p", widget: "number" }
      - { label: "القسم", name: "cat", widget: "string" }
      - { label: "الوصف", name: "desc", widget: "text" }
      - { label: "صور المنتج", name: "imgs", widget: "list", field: { label: "اسم الصورة", name: "img", widget: "string" } }
