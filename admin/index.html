<input type="file" id="pImageFile" accept="image/*">
<input type="text" id="pName" placeholder="اسم المنتج">
<input type="number" id="pPrice" placeholder="السعر">
<button id="saveBtn">رفع المنتج مع الصورة</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref as dbRef, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
    import { getStorage, ref as stRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

    // (أضف هنا بيانات الـ firebaseConfig الخاصة بك كما في المرات السابقة)
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    document.getElementById("saveBtn").addEventListener("click", async () => {
        const file = document.getElementById("pImageFile").files[0];
        const name = document.getElementById("pName").value;
        const price = document.getElementById("pPrice").value;

        if (file && name && price) {
            // 1. رفع الصورة إلى Firebase Storage
            const storageReference = stRef(storage, 'images/' + file.name);
            const snapshot = await uploadBytes(storageReference, file);
            const imageUrl = await getDownloadURL(snapshot.ref);

            // 2. حفظ البيانات + رابط الصورة في قاعدة البيانات
            push(dbRef(db, 'products'), {
                name: name,
                price: price,
                image: imageUrl
            }).then(() => alert("تم رفع المنتج والصورة بنجاح!"));
        } else {
            alert("يرجى اختيار صورة وملء البيانات");
        }
    });
</script>
