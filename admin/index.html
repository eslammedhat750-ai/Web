<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إم ميديكال</title>
</head>
<body>
    <h2>إضافة منتج جديد</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <button id="saveBtn">حفظ المنتج</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // بيانات مشروعك المربوطة بـ Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAS1b2jbNc7ojvV9Bwxtx4XV_G-YBP7YYR0WS",
            authDomain: "emmedical-85120.firebaseapp.com",
            databaseURL: "https://emmedical-85120-default-rtdb.firebaseio.com",
            projectId: "emmedical-85120",
            storageBucket: "emmedical-85120.appspot.com",
            messagingSenderId: "122044087462",
            appId: "1:122044087462:web:669c3a38cb78"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("saveBtn").addEventListener("click", () => {
            const name = document.getElementById("pName").value;
            const price = document.getElementById("pPrice").value;
            
            if(name && price) {
                push(ref(db, 'products'), {
                    name: name,
                    price: price
                }).then(() => {
                    alert("تم إضافة المنتج بنجاح إلى قاعدة البيانات!");
                    document.getElementById("pName").value = "";
                    document.getElementById("pPrice").value = "";
                }).catch((error) => {
                    alert("حدث خطأ: " + error.message);
                });
            } else {
                alert("يرجى ملء جميع الخانات");
            }
        });
    </script>
</body>
</html>
